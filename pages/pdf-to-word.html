<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>PDF to Word Converter (Coming Soon) | GoPDFNow</title>
  <meta name="description" content="Convert PDF to Word online with GoPDFNow. This feature is coming soon. Join the waitlist and get notified when it's live." />

  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="/">
        <div class="brand-icon">PDF</div>
        <span>Go<em>PdfNow</em></span>
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="section">
    <div class="container" style="text-align:center; max-width:700px;">

      <h1>PDF to Word Converter</h1>

      <p style="margin-top:10px; font-size:18px;">
        We are working on a powerful PDF to Word tool that keeps formatting clean and accurate.
      </p>

      <div style="margin:30px 0; padding:30px; border:1px solid #e5e7eb; border-radius:12px;">
        <h2>🚧 Coming Soon</h2>
        <p>This feature is under development.</p>
      </div>

      <!-- Email capture -->
      <form id="waitlistForm" style="margin-top:20px;">
        <input 
          type="email" 
          id="emailInput" 
          placeholder="Enter your email" 
          required
          style="padding:12px; width:70%; max-width:300px; border-radius:8px; border:1px solid #ccc;"
        />

        <button type="submit" class="btn btn-primary" style="margin-left:10px;">
          Notify Me
        </button>
      </form>

      <p id="waitlistMessage" style="margin-top:15px;"></p>

      <div style="margin-top:40px;">
        <a href="/merge-pdf" class="btn btn-secondary">Use Merge Tool Instead</a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <strong class="footer-brand">GoPdfNow</strong>
        <p class="footer-text">Fast, secure, and simple PDF tools.</p>
      </div>
    </div>
  </footer>

  <script>
    const form = document.getElementById("waitlistForm");
    const message = document.getElementById("waitlistMessage");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const email = document.getElementById("emailInput").value;

      // Simple local storage (temporary)
      let emails = JSON.parse(localStorage.getItem("waitlist")) || [];
      emails.push(email);
      localStorage.setItem("waitlist", JSON.stringify(emails));

      message.textContent = "✅ Thank you! We will notify you soon.";
      form.reset();
    });
  </script>

</body>
</html>
